name: learn-github-actions # 이름으로 github에서 action에 보여짐

# trigger로 특정 브랜치에 이벤트가 발생할 때 또는 일정한 주기를 작성
# 브랜치에 이벤트 자주 발생하는 경우는 일정한 주기를 갖도록 권장
# 브랜치에 이벤트가 자주 발생하지 않는다면 브랜치의 이벤트 설정 => 이때 자주 : 빌드 시 빌드 시간보다 자주 업데이트 되는 것

on:
  push:
    branches:
      - main
  schedule:
    - cron: '30 * * * *'

jobs:
  run-test-code:
    runs-on: ubuntu-latest # 실행 환경 (운영체제)
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # 코드를 가져오는 것
      - name: Setup Python 3.10
        uses: actions/setup-python@v2 # 실행 환경 (프로그래밍 언어나 프레임워크)
        with:
          python-version: "3.10" 
      - name: Install Dependencies
        run: pip install -r requirements.txt
      - name: python test
        run: pytest 

  build:
    needs: [run-test-code] # run-test-code를 끝내야 buld 시작
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python 3.10
        uses: actions/setup-python@v2
        with:
          python-version: "3.10" 
      - name: Install Dependencies
        run: pip install -r requirements.txt
      - name: Login to DockerHub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: build and realease to DockerHub
        run:
          docker build -t ${{ secrets.DOCKERHUB_REPO }} .
          docker tag -t ${{ secrets.DOCKERHUB_REPO }}:latest ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:latest
