apiVersion: v1
kind: ConfigMap
metadata:
  name: parking-db-init-config
data:
  # [1] parking-command-service: 쓰기 모델 및 점유 제어 (Lock Anchor)
  command-init.sql: |
    CREATE TABLE IF NOT EXISTS PARKING_COMMAND_OPERATION (
        id BIGINT PRIMARY KEY AUTO_INCREMENT,
        operation_id VARCHAR(64) NOT NULL,
        action VARCHAR(64) NOT NULL,
        response_payload JSON,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
        UNIQUE KEY uniq_parking_command_op (operation_id, action)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

    CREATE TABLE IF NOT EXISTS PARKING_SLOT (
        slot_id BIGINT PRIMARY KEY, -- zone-service와 ID 동기화
        zone_id BIGINT NOT NULL,
        slot_code VARCHAR(50) NOT NULL,
        is_active TINYINT(1) NOT NULL DEFAULT 1,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
        UNIQUE KEY uniq_zone_slot_code (zone_id, slot_code)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

    CREATE TABLE IF NOT EXISTS PARKING_HISTORY (
        history_id BIGINT PRIMARY KEY AUTO_INCREMENT,
        slot_id BIGINT NOT NULL,
        zone_id BIGINT NOT NULL,
        slot_type_id BIGINT NOT NULL,
        slot_code VARCHAR(50) NOT NULL,
        vehicle_num VARCHAR(20) NOT NULL,
        status VARCHAR(16) NOT NULL, -- PARKED, EXITED
        entry_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        exit_at TIMESTAMP NULL,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
        FOREIGN KEY (slot_id) REFERENCES PARKING_SLOT(slot_id),
        INDEX idx_history_slot_entry (slot_id, entry_at),
        INDEX idx_history_vehicle_exit (vehicle_num, exit_at)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

    CREATE TABLE IF NOT EXISTS SLOT_OCCUPANCY (
        slot_id BIGINT PRIMARY KEY,
        occupied TINYINT(1) NOT NULL DEFAULT 0,
        vehicle_num VARCHAR(20) NULL,
        history_id BIGINT NULL,
        occupied_at TIMESTAMP NULL,
        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
        FOREIGN KEY (slot_id) REFERENCES PARKING_SLOT(slot_id),
        FOREIGN KEY (history_id) REFERENCES PARKING_HISTORY(history_id),
        UNIQUE KEY uniq_occupancy_history (history_id)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

  # [2] parking-query-service: 조회 전용 Projection (View)
  query-init.sql: |
    CREATE TABLE IF NOT EXISTS PARKING_QUERY_OPERATION (
        id BIGINT PRIMARY KEY AUTO_INCREMENT,
        operation_id VARCHAR(64) NOT NULL,
        action VARCHAR(64) NOT NULL,
        response_payload JSON,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
        UNIQUE KEY uniq_parking_query_op (operation_id, action)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

    CREATE TABLE IF NOT EXISTS CURRENT_PARKING_VIEW (
        vehicle_num VARCHAR(20) PRIMARY KEY,
        history_id BIGINT NULL,
        zone_id BIGINT NULL,
        slot_id BIGINT NULL,
        slot_code VARCHAR(50) NULL,
        zone_name VARCHAR(100) NULL,
        slot_name VARCHAR(50) NULL, -- 외부 노출용 (현재 slot_code와 동일)
        slot_type VARCHAR(50) NOT NULL,
        entry_at TIMESTAMP NOT NULL,
        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

    CREATE TABLE IF NOT EXISTS ZONE_AVAILABILITY (
        id BIGINT PRIMARY KEY AUTO_INCREMENT,
        zone_id BIGINT NOT NULL,
        slot_type VARCHAR(50) NOT NULL,
        total_count INT NOT NULL,
        occupied_count INT NOT NULL,
        available_count INT NOT NULL,
        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
        UNIQUE KEY uniq_zone_slot_type (zone_id, slot_type)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

  # [3] vehicle-service: 차량 마스터 정보
  vehicle-init.sql: |
    CREATE TABLE IF NOT EXISTS VEHICLE (
        vehicle_num VARCHAR(20) PRIMARY KEY,
        vehicle_type VARCHAR(16) NOT NULL, -- GENERAL, EV, DISABLED
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

  # [4] zone-service: 슬롯 메타데이터 원본 (Authoritative Source)
  zone-init.sql: |
    CREATE TABLE IF NOT EXISTS ZONE (
        zone_id BIGINT PRIMARY KEY AUTO_INCREMENT,
        zone_name VARCHAR(100) NOT NULL UNIQUE,
        is_active TINYINT(1) NOT NULL DEFAULT 1,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

    CREATE TABLE IF NOT EXISTS SLOT_TYPE (
        slot_type_id BIGINT PRIMARY KEY AUTO_INCREMENT,
        type_name VARCHAR(50) NOT NULL UNIQUE,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

    CREATE TABLE IF NOT EXISTS ZONE_PARKING_SLOT (
        slot_id BIGINT PRIMARY KEY AUTO_INCREMENT,
        zone_id BIGINT NOT NULL,
        slot_type_id BIGINT NOT NULL,
        slot_code VARCHAR(50) NOT NULL,
        is_active TINYINT(1) NOT NULL DEFAULT 1,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
        FOREIGN KEY (zone_id) REFERENCES ZONE(zone_id),
        FOREIGN KEY (slot_type_id) REFERENCES SLOT_TYPE(slot_type_id)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

  # [5] orchestration-service: Saga 상태 관리
  orchestration-init.sql: |
    CREATE TABLE IF NOT EXISTS SAGA_OPERATION (
        operation_id VARCHAR(64) PRIMARY KEY,
        idempotency_key VARCHAR(128) NOT NULL UNIQUE,
        saga_type VARCHAR(16) NOT NULL, -- ENTRY, EXIT
        status VARCHAR(32) NOT NULL,
        current_step VARCHAR(64) NULL,
        history_id BIGINT NULL,
        vehicle_num VARCHAR(20) NULL,
        slot_id BIGINT NULL,
        last_error_code VARCHAR(64) NULL,
        last_error_message TEXT NULL,
        result_snapshot JSON NOT NULL,
        completed_compensations JSON NOT NULL,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
        completed_at TIMESTAMP NULL
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
