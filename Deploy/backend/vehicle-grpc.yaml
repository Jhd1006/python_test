apiVersion: apps/v1
kind: Deployment
metadata:
  name: vehicle-grpc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vehicle-grpc
  template:
    metadata:
      labels:
        app: vehicle-grpc
    spec:
      containers:
      - name: app
        image: hyungdongjo/parking-vehicle-app:latest
        imagePullPolicy: Always
        # [수정] 마이그레이션 후 gRPC 서버 실행
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "Running migrations for Vehicle Service..."
            /opt/venv/bin/python manage.py migrate --noinput &&
            echo "Migrations successful. Starting Vehicle gRPC server..."
            /opt/venv/bin/python manage.py run_vehicle_grpc
        ports:
        - containerPort: 50015
        env:
        - name: PYTHONPATH
          value: "/app:/app/shared:/app/contracts/gen/python:/app/services/vehicle-service/src"
        - name: DJANGO_SETTINGS_MODULE
          value: "park_py.settings_vehicle"
        - name: VEHICLE_DB_HOST
          value: "vehicle-db-service"
        - name: VEHICLE_DB_PORT
          value: "3306"
        - name: VEHICLE_DB_NAME
          value: "parking_db"
        - name: VEHICLE_DB_USER
          valueFrom:
            secretKeyRef:
              name: parking-db-secret
              key: user-id
        - name: VEHICLE_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: parking-db-secret
              key: user-password
        - name: VEHICLE_GRPC_PORT
          value: "50015"
        - name: DJANGO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: parking-secret
              key: django_secret_key
        - name: VEHICLE_SERVICE_GRPC_TARGET
          value: "vehicle-grpc:50015"
        - name: ZONE_SERVICE_GRPC_TARGET
          value: "zone-grpc:50016"
        - name: PARKING_COMMAND_SERVICE_GRPC_TARGET
          value: "parking-command-grpc:50017"
        - name: PARKING_QUERY_SERVICE_GRPC_TARGET
          value: "parking-query-grpc:50018"
---
apiVersion: v1
kind: Service
metadata:
  name: vehicle-grpc
spec:
  selector:
    app: vehicle-grpc
  ports:
    - protocol: TCP
      port: 50015
      targetPort: 50015
