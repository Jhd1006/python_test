apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestration-http
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orchestration-http
  template:
    metadata:
      labels:
        app: orchestration-http
    spec:
      containers:
      - name: app
        image: hyungdongjo/parking-orchestration-app:latest
        imagePullPolicy: Always
        # [수정] 마이그레이션 선행 후 서버 실행 로직 추가
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "Waiting for DB to be ready and running migrations..."
            /opt/venv/bin/python manage.py migrate --noinput &&
            echo "Migrations completed successfully. Starting Gunicorn..."
            /opt/venv/bin/gunicorn \
              --bind 0.0.0.0:8000 \
              --workers 2 \
              park_py.wsgi:application \
              --access-logfile - \
              --error-logfile - \
              --capture-output \
              --log-level debug
        ports:
        - containerPort: 8000
        env:
        - name: PYTHONPATH
          value: "/app:/app/shared:/app/contracts/gen/python:/app/services/orchestration-service/src"
        - name: DJANGO_SETTINGS_MODULE
          value: "park_py.settings_orchestration"
        - name: ORCHESTRATION_DB_HOST
          value: "orchestration-db-service"
        - name: ORCHESTRATION_DB_PORT
          value: "3306"
        - name: ORCHESTRATION_DB_NAME
          value: "parking_db"
        - name: ORCHESTRATION_DB_USER
          valueFrom:
            secretKeyRef:
              name: parking-db-secret
              key: user-id
        - name: ORCHESTRATION_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: parking-db-secret
              key: user-password
        - name: DJANGO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: parking-secret
              key: django_secret_key
        - name: VEHICLE_SERVICE_GRPC_TARGET
          value: "vehicle-grpc:50015"
        - name: ZONE_SERVICE_GRPC_TARGET
          value: "zone-grpc:50016"
        - name: PARKING_COMMAND_SERVICE_GRPC_TARGET
          value: "parking-command-grpc:50017"
        - name: PARKING_QUERY_SERVICE_GRPC_TARGET
          value: "parking-query-grpc:50018"
---
apiVersion: v1
kind: Service
metadata:
  name: orchestration-http  # 이 이름이 봇이 찾는 이름입니다!
spec:
  selector:
    app: orchestration-http
  ports:
    - protocol: TCP
      port: 8000        # 봇이 접속할 포트
      targetPort: 8000  # 컨테이너 포트
  type: ClusterIP
